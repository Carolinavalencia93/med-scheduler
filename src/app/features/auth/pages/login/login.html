<form [formGroup]="loginForm" (ngSubmit)="login()" class="login-form">
  <div class="form-group">
    <label for="email">Correo electrónico</label>

    <input
      id="email"
      type="email"
      formControlName="email"
      required
      placeholder="Ingresa tu correo"
    />

    @if (email.touched && email.hasError('required')) {
      <small class="error"> El correo es obligatorio. </small>
    }

    @if (email.touched && email.hasError('email')) {
      <small class="error"> Ingresa un correo válido. </small>
    }
  </div>

  <div class="form-group">
    <label for="password">Contraseña</label>

    <input
      id="password"
      type="password"
      formControlName="password"
      required
      placeholder="Ingresa tu contraseña"
    />

    @if (password.touched && password.hasError('required')) {
      <small class="error"> La contraseña es obligatoria. </small>
    }
  </div>

  @if (errorMessage) {
    <p class="error-message">
      {{ errorMessage }}
    </p>
  }

  <button type="submit" [disabled]="loading">
    @if (loading) {
      Ingresando...
    } @else {
      Ingresar
    }
  </button>
</form>
