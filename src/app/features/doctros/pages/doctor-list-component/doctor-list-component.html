<section class="doctor-list">
  <div class="page-header">
    <div>
      <h1 class="page-title">Médicos</h1>

      <p class="page-subtitle">Gestiona los médicos registrados.</p>
    </div>
  </div>

  <div class="filters">
    <app-search-input-component placeholder="Buscar médico"> </app-search-input-component>

    <app-button label="Nuevo médico" icon="add" (clicked)="openCreateDoctor()"> </app-button>
  </div>

  <table>
    <table>
      <thead>
        <tr>
          <th>Nombre</th>

          <th>Especialidad</th>

          <th>Estado</th>

          <th>Acciones</th>
        </tr>
      </thead>

      <tbody>
        @if (doctors().length === 0) {
          <tr>
            <td colspan="4" class="empty-state">No hay médicos registrados.</td>
          </tr>
        } @else {
          @for (doctor of doctors(); track doctor.id) {
            <tr>
              <td>{{ doctor.nombreCompleto }}</td>

              <td>{{ doctor.especialidad }}</td>

              <td>{{ doctor.estado }}</td>

              <td class="actions">
                <mat-icon class="action-icon">visibility</mat-icon>

                <mat-icon class="action-icon" (click)="editDoctor(doctor)"> edit </mat-icon>

                <mat-icon class="action-icon">delete</mat-icon>
              </td>
            </tr>
          }
        }
      </tbody>
    </table>
  </table>
</section>
